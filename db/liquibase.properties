# ──────────────────────────────────────────────────────────────────
# Liquibase Properties — Executive Assistant (PostgreSQL)
# ──────────────────────────────────────────────────────────────────

# JDBC driver class
driver=org.postgresql.Driver

# Connection URL
url=jdbc:postgresql://localhost:5432/ea_db

# Database credentials
username=postgres
password=Admin123

# Root changelog file
changeLogFile=changelog-root.xml

# Liquibase meta-tables
databaseChangeLogTableName=DATABASECHANGELOG
databaseChangeLogLockTableName=DATABASECHANGELOGLOCK

# Logging
logLevel=INFO
